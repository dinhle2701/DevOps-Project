name: DevOps CI/CD pipeline for Spring Boot Project

on:
  push:
    branches:
      - feat/devops-cicd

jobs:
  # 1st job
  infrastructure:
    runs-on: ubuntu-latest
    working-directory: infrastructure-pipeline-cicd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
        
